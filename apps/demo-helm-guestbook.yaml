apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-helm-guestbook
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Pritichitbone653/argocd-example-apps.git
    targetRevision: main
    path: helm-guestbook
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-helm-guestbook
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true